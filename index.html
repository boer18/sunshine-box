<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>阳光盒</title>
  <style>
    :root {
      --sky-top: #5ec8ff;
      --sky-mid: #bfeeff;
      --sky-low: #fff4b2;
      --ink: #243044;
      --soft-ink: rgba(36, 48, 68, 0.74);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(255, 255, 255, 0.86);
      --yellow: #ffd33d;
      --orange: #ff8c1f;
      --pink: #ff5d8f;
      --teal: #1bc7a6;
      --blue: #2897ff;
      --violet: #8068ff;
      --shadow: rgba(119, 72, 15, 0.25);
      --heat: 0;
      --heat-percent: 0%;
      --halo-scale: 0.78;
      --halo-opacity: 0.38;
      --glow-size: 18px;
      --box-rotate: -8deg;
      --lid-tilt: -8deg;
      --lid-rotate: -3deg;
      --lid-rise: 0px;
      --face-scale: 1;
      --flash-opacity: 0;
      --shake-x: 0px;
      --shake-y: 0px;
      --storm-opacity: 0;
      --storm-scale: 0.92;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 20%, rgba(255, 255, 255, 0.9), transparent 16rem),
        radial-gradient(circle at 82% 15%, rgba(255, 238, 157, 0.85), transparent 17rem),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-low) 100%);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      min-width: 320px;
      min-height: 100dvh;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .stage {
      position: relative;
      z-index: 3;
      display: grid;
      min-height: 100%;
      min-height: 100dvh;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 3vw, 34px);
      transform: translate(var(--shake-x), var(--shake-y));
      transition: transform 0.05s linear;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 92px);
      line-height: 0.94;
      font-weight: 950;
      color: #fffef2;
      text-shadow:
        0 5px 0 rgba(243, 149, 18, 0.72),
        0 14px 34px rgba(255, 115, 0, 0.34);
    }

    .subtitle {
      display: inline-flex;
      align-items: center;
      width: max-content;
      max-width: min(90vw, 640px);
      min-height: 34px;
      padding: 6px 12px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.14);
      color: #fff;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(19, 98, 166, 0.16);
      backdrop-filter: blur(10px);
      text-shadow: 0 2px 8px rgba(36, 48, 68, 0.22);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meter-board {
      width: min(34vw, 330px);
      min-width: 218px;
      border: 2px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel);
      box-shadow: 0 18px 42px rgba(36, 48, 68, 0.12);
      backdrop-filter: blur(14px);
    }

    .meter-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      font-weight: 950;
      color: var(--soft-ink);
    }

    .meter-value {
      font-variant-numeric: tabular-nums;
      color: #f47c17;
    }

    .meter {
      position: relative;
      height: 16px;
      margin-top: 10px;
      border: 2px solid rgba(36, 48, 68, 0.16);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.62);
    }

    .meter-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--heat-percent);
      min-width: 8px;
      border-radius: inherit;
      background:
        linear-gradient(90deg, var(--teal), var(--yellow) 42%, var(--orange) 74%, var(--pink)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.36) 0 8px, transparent 8px 15px);
      box-shadow: 0 0 24px rgba(255, 211, 61, 0.76);
      transition: width 0.18s ease;
    }

    .sound-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      min-height: 34px;
      margin-top: 11px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      padding: 5px 7px 5px 12px;
      background: rgba(36, 48, 68, 0.1);
      color: var(--soft-ink);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 950;
      box-shadow: inset 0 -3px 0 rgba(36, 48, 68, 0.05);
    }

    .sound-toggle b {
      min-width: 38px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.72);
      color: #fff;
      text-align: center;
      font-size: 12px;
    }

    .sound-toggle[aria-pressed="true"] {
      background: rgba(255, 211, 61, 0.3);
      color: #9f5000;
      box-shadow:
        inset 0 -3px 0 rgba(255, 141, 31, 0.12),
        0 0 18px rgba(255, 211, 61, 0.36);
    }

    .sound-toggle[aria-pressed="true"] b {
      background: #f47c17;
    }

    .sound-toggle:focus-visible {
      outline: 4px solid rgba(40, 151, 255, 0.58);
      outline-offset: 2px;
    }

    .arena {
      position: relative;
      display: grid;
      place-items: center;
      padding-bottom: min(6vh, 42px);
      perspective: 1000px;
    }

    .halo {
      position: absolute;
      width: min(72vw, 760px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 244, 139, 0.86), rgba(255, 214, 48, 0.28) 38%, transparent 68%);
      filter: blur(10px);
      transform: scale(var(--halo-scale));
      opacity: var(--halo-opacity);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 0;
    }

    .box-wrap {
      position: relative;
      z-index: 4;
      display: grid;
      place-items: center;
      width: clamp(210px, 32vw, 380px);
      aspect-ratio: 1.05;
      filter:
        drop-shadow(0 34px 28px var(--shadow))
        drop-shadow(0 0 var(--glow-size) rgba(255, 220, 62, 0.66));
      transform-style: preserve-3d;
      transform: rotateX(9deg) rotateY(var(--box-rotate));
      transition: filter 0.18s ease;
    }

    .box-cluster {
      position: relative;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 3vw, 30px);
      width: min(92vw, 700px);
    }

    .super-click-button {
      position: relative;
      display: grid;
      gap: 5px;
      place-items: center;
      width: clamp(92px, 13vw, 138px);
      min-height: clamp(92px, 13vw, 138px);
      border: 4px solid rgba(255, 255, 255, 0.92);
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 24%, rgba(255, 255, 255, 0.92), transparent 22%),
        conic-gradient(from -30deg, #ff5d8f, #ffd33d, #1bc7a6, #2897ff, #8068ff, #ff5d8f);
      color: #fffef2;
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      line-height: 1;
      text-align: center;
      text-shadow:
        0 2px 0 rgba(91, 44, 0, 0.45),
        0 8px 18px rgba(36, 48, 68, 0.24);
      box-shadow:
        inset 0 -9px 0 rgba(36, 48, 68, 0.14),
        0 16px 30px rgba(36, 48, 68, 0.18),
        0 0 24px rgba(255, 211, 61, 0.36);
      transform: rotate(5deg);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      outline: none;
    }

    .super-click-button[hidden] {
      display: none;
    }

    .super-click-button.unlocked {
      animation: unlockPop 0.72s cubic-bezier(0.16, 1.25, 0.28, 1) both;
    }

    .super-click-button::before {
      content: "";
      position: absolute;
      inset: -9px;
      border: 3px dashed rgba(255, 255, 255, 0.75);
      border-radius: inherit;
      opacity: 0.72;
    }

    .super-click-button span {
      position: relative;
      display: block;
      max-width: 82px;
      font-size: clamp(16px, 2.3vw, 24px);
    }

    .super-click-button b {
      position: relative;
      min-width: 38px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.76);
      color: #fff;
      font-size: clamp(13px, 1.8vw, 18px);
      font-weight: 950;
    }

    .super-click-button[aria-pressed="true"] {
      filter: saturate(1.28) brightness(1.08);
      transform: rotate(-4deg) scale(1.07);
      box-shadow:
        inset 0 -9px 0 rgba(36, 48, 68, 0.14),
        0 19px 38px rgba(255, 93, 143, 0.24),
        0 0 44px rgba(255, 211, 61, 0.82);
    }

    .super-click-button[aria-pressed="true"]::before {
      animation: turboSpin 1.1s linear infinite;
      opacity: 1;
    }

    .super-click-button:focus-visible {
      box-shadow:
        inset 0 -9px 0 rgba(36, 48, 68, 0.14),
        0 0 0 6px rgba(40, 151, 255, 0.72),
        0 19px 38px rgba(255, 93, 143, 0.24),
        0 0 44px rgba(255, 211, 61, 0.82);
    }

    .upgrade-click-button {
      position: absolute;
      right: max(0px, calc(50% - 350px));
      bottom: clamp(8px, 5vh, 48px);
      z-index: 8;
      display: grid;
      gap: 3px;
      place-items: center;
      min-width: clamp(126px, 17vw, 184px);
      min-height: 62px;
      border: 4px solid rgba(255, 255, 255, 0.94);
      border-radius: 8px;
      padding: 8px 14px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), transparent 32%),
        linear-gradient(90deg, #ff4b1f, #ffd33d 44%, #1bc7a6 100%);
      color: #fffef2;
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      line-height: 1;
      text-align: center;
      text-shadow:
        0 2px 0 rgba(91, 44, 0, 0.48),
        0 8px 18px rgba(36, 48, 68, 0.28);
      box-shadow:
        inset 0 -7px 0 rgba(36, 48, 68, 0.15),
        0 18px 34px rgba(255, 75, 31, 0.24),
        0 0 30px rgba(255, 211, 61, 0.6);
      transform: rotate(-3deg);
      outline: none;
    }

    .upgrade-click-button[hidden] {
      display: none;
    }

    .upgrade-click-button span {
      font-size: clamp(15px, 2vw, 22px);
    }

    .upgrade-click-button b {
      min-width: 54px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.78);
      color: #fff;
      font-size: clamp(13px, 1.7vw, 18px);
    }

    .upgrade-click-button.ready {
      animation: upgradePulse 0.74s cubic-bezier(0.16, 1.25, 0.28, 1) both, upgradeGlow 1s ease-in-out infinite;
    }

    .upgrade-click-button:focus-visible {
      box-shadow:
        inset 0 -7px 0 rgba(36, 48, 68, 0.15),
        0 0 0 6px rgba(40, 151, 255, 0.72),
        0 18px 34px rgba(255, 75, 31, 0.24),
        0 0 30px rgba(255, 211, 61, 0.6);
    }

    .sun-box {
      position: relative;
      width: 74%;
      height: 64%;
      border: 0;
      border-radius: 18px 18px 30px 30px;
      cursor: pointer;
      transform-style: preserve-3d;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0 14%, transparent 15% 100%),
        linear-gradient(160deg, #ffef6b 0%, #ffc837 46%, #ff8d2a 100%);
      box-shadow:
        inset 0 10px 0 rgba(255, 255, 255, 0.34),
        inset 0 -13px 0 rgba(177, 81, 0, 0.16),
        0 0 0 5px rgba(158, 81, 11, 0.16),
        0 22px 50px rgba(166, 87, 0, 0.32);
      animation: idleBounce 2.2s ease-in-out infinite;
      outline: none;
    }

    .sun-box:focus-visible {
      box-shadow:
        inset 0 10px 0 rgba(255, 255, 255, 0.34),
        inset 0 -13px 0 rgba(177, 81, 0, 0.16),
        0 0 0 6px rgba(40, 151, 255, 0.7),
        0 22px 50px rgba(166, 87, 0, 0.32);
    }

    .sun-box::before {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      top: -26%;
      height: 34%;
      border-radius: 20px 20px 12px 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.52), transparent 36%),
        linear-gradient(180deg, #ffe977, #ffb526);
      box-shadow:
        inset 0 8px 0 rgba(255, 255, 255, 0.42),
        0 10px 0 rgba(197, 101, 4, 0.2),
        0 20px 34px rgba(255, 179, 32, 0.52);
      transform-origin: 18% 100%;
      transform: rotateX(var(--lid-tilt)) rotateZ(var(--lid-rotate)) translateY(var(--lid-rise));
      transition: transform 0.14s ease;
    }

    .sun-box::after {
      content: "";
      position: absolute;
      inset: 17% 15% auto;
      height: 34%;
      border-radius: 999px 999px 42px 42px;
      background:
        radial-gradient(circle at 22% 42%, #3d2b16 0 8%, transparent 9%),
        radial-gradient(circle at 78% 42%, #3d2b16 0 8%, transparent 9%),
        radial-gradient(ellipse at 50% 88%, #3d2b16 0 23%, transparent 24%);
      opacity: 0.8;
      transform: scale(var(--face-scale));
    }

    .sun-box.pressing {
      animation: panicBounce 0.28s ease-in-out infinite;
    }

    .label-belt {
      position: absolute;
      left: 9%;
      right: 9%;
      bottom: 13%;
      display: grid;
      place-items: center;
      min-height: 38px;
      border: 3px solid rgba(132, 65, 5, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.56);
      color: #9f5000;
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 950;
      line-height: 1;
      box-shadow: inset 0 -4px 0 rgba(255, 192, 66, 0.28);
    }

    .label-belt span {
      transform: rotate(-1deg);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.76);
    }

    .antenna {
      position: absolute;
      z-index: 6;
      left: 50%;
      top: -23%;
      width: 14%;
      height: 24%;
      transform: translateX(-50%) rotate(var(--antenna-rotate, -7deg));
      transform-origin: 50% 100%;
    }

    .antenna::before {
      content: "";
      position: absolute;
      left: 46%;
      bottom: 0;
      width: 12%;
      height: 82%;
      border-radius: 999px;
      background: #2e8bd8;
      box-shadow: inset 2px 0 0 rgba(255, 255, 255, 0.42);
    }

    .antenna::after {
      content: "";
      position: absolute;
      left: 9%;
      top: 0;
      width: 82%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.86), transparent 22%),
        linear-gradient(135deg, #ff5d8f, #8068ff);
      box-shadow:
        0 0 0 5px rgba(255, 255, 255, 0.44),
        0 0 24px rgba(255, 93, 143, 0.74);
    }

    .mouth-sign {
      position: absolute;
      top: 52%;
      left: 50%;
      z-index: 7;
      min-width: 74px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #27364f;
      color: #fffef2;
      font-size: clamp(12px, 1.6vw, 15px);
      font-weight: 950;
      transform: translate(-50%, -50%) rotate(-2deg);
      box-shadow: 0 9px 18px rgba(36, 48, 68, 0.18);
      opacity: 0.92;
      white-space: nowrap;
    }

    .shockwave {
      position: fixed;
      left: 0;
      top: 0;
      width: 22px;
      height: 22px;
      border: 4px solid rgba(255, 236, 91, 0.86);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%) scale(0.2);
      animation: wave 0.72s ease-out forwards;
      mix-blend-mode: screen;
    }

    .shockwave.mega {
      border-width: 7px;
      border-color: rgba(255, 255, 255, 0.92);
      box-shadow:
        0 0 28px rgba(255, 238, 96, 0.86),
        inset 0 0 24px rgba(255, 144, 31, 0.48);
      animation-duration: 1.04s;
    }

    .screen-flash {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: var(--flash-opacity);
      background:
        radial-gradient(circle at 50% 47%, rgba(255, 255, 255, 0.98), rgba(255, 245, 123, 0.62) 24%, rgba(255, 112, 31, 0.18) 52%, transparent 75%);
      mix-blend-mode: screen;
      transition: opacity 0.12s ease-out;
    }

    .storm-badge {
      position: fixed;
      z-index: 7;
      left: 50%;
      top: clamp(82px, 14vh, 130px);
      width: min(88vw, 560px);
      padding: 10px 16px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 96, 47, 0.92), rgba(255, 212, 55, 0.96), rgba(55, 205, 255, 0.9));
      color: #fffef2;
      font-size: clamp(17px, 3vw, 34px);
      font-weight: 950;
      text-align: center;
      text-shadow:
        0 3px 0 rgba(159, 80, 0, 0.58),
        0 8px 22px rgba(255, 74, 19, 0.34);
      box-shadow:
        0 22px 46px rgba(255, 96, 47, 0.22),
        0 0 34px rgba(255, 244, 119, 0.52);
      opacity: var(--storm-opacity);
      transform: translateX(-50%) rotate(-1deg) scale(var(--storm-scale));
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .comic-sticker {
      position: fixed;
      z-index: 7;
      left: 0;
      top: 0;
      padding: 6px 12px;
      border: 4px solid #2d3148;
      border-radius: 8px;
      background: #fffef2;
      color: #ff4b1f;
      font-size: clamp(22px, 5vw, 64px);
      font-weight: 950;
      line-height: 0.95;
      text-shadow:
        2px 2px 0 #ffd33d,
        4px 4px 0 rgba(45, 49, 72, 0.2);
      box-shadow: 0 16px 32px rgba(36, 48, 68, 0.18);
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(var(--sticker-rotate, -8deg)) scale(0.3);
      animation: stickerBlast 0.78s cubic-bezier(0.16, 1.25, 0.28, 1) forwards;
    }

    .caption {
      position: fixed;
      z-index: 5;
      left: 0;
      top: 0;
      max-width: min(68vw, 520px);
      padding: 8px 13px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      color: #9f5000;
      font-size: clamp(13px, 1.6vw, 19px);
      font-weight: 950;
      line-height: 1.24;
      text-align: center;
      white-space: normal;
      overflow-wrap: anywhere;
      box-shadow: 0 13px 30px rgba(255, 121, 19, 0.22);
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: captionFly 1.25s ease-out forwards;
    }

    .ground {
      position: absolute;
      left: -5vw;
      right: -5vw;
      bottom: -10vh;
      height: 28vh;
      border-radius: 50% 50% 0 0;
      background:
        radial-gradient(circle at 18% 30%, rgba(255, 255, 255, 0.35), transparent 7rem),
        linear-gradient(90deg, #46bf7e, #96db65 45%, #32b7a8 100%);
      box-shadow: inset 0 28px 0 rgba(255, 255, 255, 0.2);
      z-index: 0;
    }

    .cloud {
      position: fixed;
      z-index: 0;
      width: clamp(110px, 17vw, 230px);
      height: clamp(34px, 5vw, 70px);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow:
        24px -14px 0 rgba(255, 255, 255, 0.72),
        64px -4px 0 rgba(255, 255, 255, 0.68),
        30px 16px 0 rgba(255, 255, 255, 0.54);
      filter: blur(0.2px);
      opacity: 0.72;
      animation: floatCloud 22s linear infinite;
    }

    .cloud.one {
      left: -14vw;
      top: 22vh;
    }

    .cloud.two {
      left: 78vw;
      top: 10vh;
      transform: scale(0.74);
      animation-duration: 28s;
      animation-delay: -12s;
    }

    .cloud.three {
      left: 30vw;
      top: 73vh;
      transform: scale(0.58);
      animation-duration: 35s;
      animation-delay: -20s;
      opacity: 0.48;
    }

    .ticker {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.16);
      color: #fff;
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 950;
      text-align: center;
      text-shadow: 0 2px 8px rgba(36, 48, 68, 0.25);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(37, 133, 188, 0.16);
    }

    .comic-pop {
      animation: comicPop 0.22s cubic-bezier(0.2, 1.4, 0.32, 1) both;
    }

    @keyframes idleBounce {
      0%,
      100% {

<body>
  <canvas id="sunCanvas" aria-hidden="true"></canvas>
  <div class="screen-flash" id="screenFlash" aria-hidden="true"></div>
  <div class="storm-badge" id="stormBadge" aria-hidden="true">太阳风暴准备中：请不要直视废话</div>
  <div class="cloud one"></div>
  <div class="cloud two"></div>
  <div class="cloud three"></div>
  <div class="ground"></div>

  <main class="stage" aria-label="阳光盒">
    <header class="topline">

        <div class="meter" aria-hidden="true">

        </div>

    <section class="arena">

          <span>超级连点</span>
          <b id="turboStatus">关</b>
        </button>
        <button class="upgrade-click-button" id="upgradeClickButton" type="button" aria-label="升级超级连点" hidden>
          <span>升级超级连点</span>
          <b id="upgradeStatus">→200%</b>
        </button>
      </div>
    </section>

    <footer class="ticker" id="ticker">天气预报：只要太阳出来了，天就会变亮，这很科学。</footer>
  </main>

  <script>
    const canvas = document.getElementById("sunCanvas");
    const ctx = canvas.getContext("2d");
    const box = document.getElementById("sunBox");
    const boxWrap = document.getElementById("boxWrap");
    const ticker = document.getElementById("ticker");
    const subtitle = document.getElementById("subtitle");
    const sunCount = document.getElementById("sunCount");
    const heatText = document.getElementById("heatText");
    const mouthSign = document.getElementById("mouthSign");
    const stormBadge = document.getElementById("stormBadge");
    const superClickButton = document.getElementById("superClickButton");
    const turboStatus = document.getElementById("turboStatus");
    const upgradeClickButton = document.getElementById("upgradeClickButton");
    const upgradeStatus = document.getElementById("upgradeStatus");
    const soundToggle = document.getElementById("soundToggle");
    const soundStatus = document.getElementById("soundStatus");

    const funnyLines = [
      "当你点击了一下，你就完成了一次点击。",
      "当你度过了1分钟，你就度过了60秒。",

      "你的每次点击，都让这个按钮更像按钮。"
    ];

    const subtitles = [
      "今日营业：把阴天打包退货",
      "阳光从不迟到，只是偶尔堵在盒子里",
      "本盒拒绝低调，亮度正在失控",
      "太阳批发部临时开张",
      "阴影克星，快乐超标",
      "积极能量发货中，签收即变亮",
      "只要开始发光，就已经开始发光",

      "点击是手指对太阳的友好问候"
    ];

    const mouthWords = ["开朗", "暴晒", "膨胀", "闪耀", "加班", "离谱", "积极", "废话", "很亮", "有理"];

    const stickerWords = [
      "嘭!",
      "咣!",
      "亮瞎!",
      "太阳+1",
      "离谱!",
      "积极爆破",
      "废话发射",
      "晴朗超载",
      "BOOM!",
      "很有道理!"
    ];

    let width = 0;
    let height = 0;
    let dpr = 1;
    let particles = [];
    let rays = [];
    let confetti = [];
    let flares = [];
    let heat = 0;
    let renderedHeat = -1;
    let flashOpacity = 0;
    let shakeStrength = 0;
    let quality = 1;
    let soundEnabled = false;
    let audioContext = null;
    let lastSoundAt = 0;
    let lastTurboSoundAt = 0;
    let totalSuns = 0;
    let lastClick = 0;
    let isPressing = false;
    let superClickMode = false;
    let superClickUnlocked = false;
    let turboLevel = 1;
    let turboMaxPercent = 100;
    let turboChargePercent = 0;
    let turboUpgradeReady = false;
    let turboRamp = 0;
    let pressStart = 0;
    let activePointerId = null;
    let lastBurst = 0;
    let lastAutoBurst = 0;
    let turboCarry = 0;
    let lastFrame = performance.now();
    let lastCaptionAt = 0;
    let lastStickerAt = 0;
    let lastWaveAt = 0;
    let lineIndex = 0;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.35);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function getAudioContext() {
      if (!audioContext) {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        audioContext = new AudioCtor();
      }
      return audioContext;
    }

    function setSoundEnabled(enabled) {
      const ctxAudio = getAudioContext();
      if (enabled && !ctxAudio) {
        soundEnabled = false;
        soundStatus.textContent = "不可用";
        soundToggle.setAttribute("aria-pressed", "false");
        ticker.textContent = "这个浏览器说：我听不见，但我很有礼貌。";
        return;
      }
      const wasEnabled = soundEnabled;
      if (!enabled && wasEnabled) {
        playSound("toggleOff");
      }
      soundEnabled = enabled;
      soundToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
      soundStatus.textContent = enabled ? "开" : "关";
      if (enabled && ctxAudio.state === "suspended") {
        ctxAudio.resume();
      }
      ticker.textContent = enabled
        ? "音效已开启：现在阳光不只亮，还会吵得很积极。"
        : "音效已关闭：世界安静了，但阳光还在上班。";
      if (enabled) {
        playSound("toggleOn");
      }
    }

    function tone(freq, duration, type, gain, delay = 0, endFreq = freq) {
      if (!soundEnabled) return;
      const ctxAudio = getAudioContext();
      if (!ctxAudio) return;
      const start = ctxAudio.currentTime + delay;
      const osc = ctxAudio.createOscillator();
      const amp = ctxAudio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), start + duration);
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), start + 0.012);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(amp);
      amp.connect(ctxAudio.destination);
      osc.start(start);
      osc.stop(start + duration + 0.025);
    }

    function noiseBurst(duration, gain, delay = 0) {
      if (!soundEnabled) return;
      const ctxAudio = getAudioContext();
      if (!ctxAudio) return;
      const sampleRate = ctxAudio.sampleRate;
      const length = Math.max(1, Math.floor(sampleRate * duration));
      const buffer = ctxAudio.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      }
      const source = ctxAudio.createBufferSource();
      const filter = ctxAudio.createBiquadFilter();
      const amp = ctxAudio.createGain();
      const start = ctxAudio.currentTime + delay;
      filter.type = "highpass";
      filter.frequency.value = 900;
      amp.gain.setValueAtTime(gain, start);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      source.buffer = buffer;
      source.connect(filter);
      filter.connect(amp);
      amp.connect(ctxAudio.destination);
      source.start(start);
      source.stop(start + duration + 0.02);
    }

    function playSound(kind, intensity = 1) {
      if (!soundEnabled) return;
      const now = performance.now();
      if (kind !== "turbo" && now - lastSoundAt < 42) return;
      const turboSoundGap = Math.max(18, 86 - turboLevel * 9 - turboChargePercent * 0.04);
      if (kind === "turbo" && now - lastTurboSoundAt < turboSoundGap) return;
      if (kind === "turbo") lastTurboSoundAt = now;
      lastSoundAt = now;
      const soft = clamp(intensity, 0.45, 4.2);
      if (kind === "click") {
        tone(520 + heat * 4, 0.055, "triangle", 0.045 * soft, 0, 840 + heat * 3);
        tone(920, 0.04, "sine", 0.026 * soft, 0.015, 1240);
      } else if (kind === "hold") {
        tone(250 + heat * 2, 0.08, "sawtooth", 0.028 * soft, 0, 520 + heat * 4);
      } else if (kind === "turbo") {
        tone(760 + turboRamp * 900 + turboLevel * 95, 0.035, "square", 0.018 * soft, 0, 1100 + turboRamp * 1200 + turboLevel * 120);
      } else if (kind === "storm") {
        tone(90, 0.18, "sawtooth", 0.04 * soft, 0, 55);
        tone(420, 0.12, "triangle", 0.035 * soft, 0.02, 980);
        noiseBurst(0.12, 0.026 * soft, 0);
      } else if (kind === "upgradeReady") {
        tone(620 + turboLevel * 70, 0.08, "triangle", 0.045 * soft, 0, 920 + turboLevel * 90);
        tone(920 + turboLevel * 90, 0.1, "square", 0.028 * soft, 0.075, 1280 + turboLevel * 120);
        noiseBurst(0.08, 0.018 * soft, 0.04);
      } else if (kind === "upgrade") {
        tone(280 + turboLevel * 45, 0.1, "sawtooth", 0.04 * soft, 0, 520 + turboLevel * 80);
        tone(660 + turboLevel * 80, 0.13, "triangle", 0.05 * soft, 0.07, 1180 + turboLevel * 140);
        tone(990 + turboLevel * 120, 0.18, "sine", 0.04 * soft, 0.18, 1640 + turboLevel * 150);
        noiseBurst(0.18, 0.024 * soft, 0.05);
      } else if (kind === "unlock") {
        tone(440, 0.09, "triangle", 0.045, 0, 660);
        tone(660, 0.1, "triangle", 0.05, 0.075, 990);
        tone(990, 0.16, "sine", 0.055, 0.16, 1480);
        noiseBurst(0.16, 0.02, 0.05);
      } else if (kind === "toggleOn") {
        tone(520, 0.08, "sine", 0.035, 0, 780);
        tone(780, 0.09, "sine", 0.032, 0.07, 1040);
      } else if (kind === "toggleOff") {
        tone(520, 0.08, "sine", 0.028, 0, 280);
      }
    }

    function stormLevel() {
      if (heat >= 88) return 4;
      if (heat >= 68) return 3;
      if (heat >= 44) return 2;
      if (heat >= 20) return 1;
      return 0;
    }

    function getBoxCenter() {
      const rect = box.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height * 0.35,
        w: rect.width,
        h: rect.height
      };
    }

    function updateTurboStatus() {
      if (!superClickUnlocked) {
        turboStatus.textContent = "关";
        upgradeStatus.textContent = "→200%";
        return;
      }
      const current = Math.round(turboChargePercent);
      turboStatus.textContent = superClickMode || turboChargePercent > 0 ? current + "%" : "关";
      upgradeStatus.textContent = "→" + (turboMaxPercent + 100) + "%";
    }

    function revealTurboUpgrade() {
      if (turboUpgradeReady) return;
      turboUpgradeReady = true;
      upgradeClickButton.hidden = false;
      upgradeClickButton.classList.remove("ready");
      void upgradeClickButton.offsetWidth;
      upgradeClickButton.classList.add("ready");
      updateTurboStatus();
      ticker.textContent = "升级按钮出现：上限满了，说明它已经不够离谱了。";
      lastCaptionAt = 0;
      caption(window.innerWidth * 0.5, window.innerHeight * 0.48, "升级超级连点：上限还能再往上，因为上面还有上面。", 84);
      triggerFlash(100 + turboLevel * 28);
      triggerShake(100 + turboLevel * 18);
      playSound("upgradeReady", 1 + turboLevel * 0.18);
    }

    function upgradeSuperClick() {
      if (!turboUpgradeReady) return;
      turboLevel += 1;
      turboMaxPercent += 100;
      turboUpgradeReady = false;
      upgradeClickButton.hidden = true;
      upgradeClickButton.classList.remove("ready");
      turboChargePercent = Math.min(turboChargePercent, turboMaxPercent - 100);
      turboRamp = clamp(turboChargePercent / turboMaxPercent, 0, 1);
      updateTurboStatus();
      mouthSign.textContent = "x" + turboLevel;
      ticker.textContent = "超级连点已升级：现在上限是 " + turboMaxPercent + "%，听起来更像废话了。";
      lastCaptionAt = 0;
      caption(window.innerWidth * 0.5, window.innerHeight * 0.5, "上限 +" + 100 + "%：越高越高，高了就不低。", 96 + turboLevel * 12);
      triggerFlash(120 + turboLevel * 38);
      triggerShake(110 + turboLevel * 22);
      playSound("upgrade", 1 + turboLevel * 0.2);
      const origin = getBoxCenter();
      shockwave(origin.x, origin.y, 140 + turboLevel * 24, true);
    }

    function unlockSuperClick() {
      if (superClickUnlocked) return;
      superClickUnlocked = true;
      superClickButton.hidden = false;
      superClickButton.classList.remove("unlocked");
      void superClickButton.offsetWidth;
      superClickButton.classList.add("unlocked");
      turboStatus.textContent = "关";
      turboMaxPercent = Math.max(100, turboMaxPercent);
      turboChargePercent = 0;
      turboUpgradeReady = false;
      upgradeClickButton.hidden = true;
      updateTurboStatus();
      mouthSign.textContent = "解锁";
      ticker.textContent = "超级连点模式已解锁：进度条终于知道自己满过一次。";
      lastCaptionAt = 0;
      caption(window.innerWidth * 0.5, window.innerHeight * 0.56, "超级连点解锁：满了就是满了，这很满。", 70);
      triggerFlash(90);
      triggerShake(90);
      playSound("unlock");
      const origin = getBoxCenter();
      shockwave(origin.x, origin.y, 120, true);
    }

    function setHeat(value) {
      heat = clamp(value, 0, 100);
      if (heat >= 100) {
        unlockSuperClick();
      }
      if (Math.abs(heat - renderedHeat) < 0.28) return;
      renderedHeat = heat;
      const stormAmount = clamp((heat - 68) / 32, 0, 1);
      document.documentElement.style.setProperty("--heat", heat.toFixed(1));
      document.documentElement.style.setProperty("--heat-percent", heat.toFixed(1) + "%");
      document.documentElement.style.setProperty("--halo-scale", (0.78 + heat * 0.007 + stormAmount * 0.2).toFixed(3));
      document.documentElement.style.setProperty("--halo-opacity", (0.38 + heat * 0.0048 + stormAmount * 0.18).toFixed(3));
      document.documentElement.style.setProperty("--glow-size", (18 + heat * 0.9 + stormAmount * 38).toFixed(1) + "px");
      document.documentElement.style.setProperty("--box-rotate", (-8 + heat * 0.07).toFixed(2) + "deg");
      document.documentElement.style.setProperty("--lid-tilt", (-8 - heat * 0.19).toFixed(2) + "deg");
      document.documentElement.style.setProperty("--lid-rotate", (-3 - heat * 0.1).toFixed(2) + "deg");
      document.documentElement.style.setProperty("--lid-rise", (-heat * 0.23).toFixed(1) + "px");
      document.documentElement.style.setProperty("--face-scale", (1 + heat * 0.005).toFixed(3));
      document.documentElement.style.setProperty("--antenna-rotate", (-7 + heat * 0.18).toFixed(2) + "deg");
      document.documentElement.style.setProperty("--storm-opacity", stormAmount.toFixed(3));
      document.documentElement.style.setProperty("--storm-scale", (0.92 + stormAmount * 0.1).toFixed(3));
      stormBadge.textContent = heat >= 88
        ? "太阳风暴已开闸：废话亮度突破天花板"
        : "太阳风暴准备中：请不要直视废话";
      heatText.textContent = Math.round(heat) + "%";
    }

    function addSunParticle(origin, power, angleHint) {
      const level = stormLevel();
      const angle = angleHint ?? random(-Math.PI * 0.92, -Math.PI * 0.08);
      const speed = random(4.8, 10.8) + power * 0.07 + level * 0.5;
      const size = random(13, 26) + power * random(0.13, 0.26) + level * random(1.5, 4.5);
      const huePick = Math.random();
      const colors = huePick < 0.58
        ? ["#fff9a9", "#ffd33d", "#ff8c1f"]
        : huePick < 0.8
          ? ["#fff6d8", "#ffef6b", "#ff5d8f"]
          : ["#e7fbff", "#66e1ff", "#2897ff"];

      const rayCount = Math.floor(random(8, 13));
      particles.push({
        type: "sun",
        x: origin.x + random(-origin.w * 0.18, origin.w * 0.18),
        y: origin.y + random(-origin.h * 0.12, origin.h * 0.08),
        vx: Math.cos(angle) * speed + random(-1.7, 1.7),
        vy: Math.sin(angle) * speed - random(1, 4),
        size,
        spin: random(-0.12, 0.12),
        rotation: random(0, Math.PI),
        life: random(0.85, 1.38) + power * 0.0035 + level * 0.04,
        maxLife: 1,
        colors,
        rays: rayCount,
        rayScales: Array.from({ length: rayCount }, () => random(0.86, 1.05)),
        wobble: random(0.8, 2.2)
      });
      particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
    }

    function addBottomSunParticle(origin, power) {
      const leftSide = Math.random() > 0.5;
      const angle = leftSide
        ? random(Math.PI * 0.56, Math.PI * 0.9)
        : random(Math.PI * 0.1, Math.PI * 0.44);
      const level = stormLevel();
      const speed = random(6.2, 13.2) + power * 0.055 + level * 0.8;
      const size = random(12, 24) + power * random(0.1, 0.22) + level * 2.4;
      const rayCount = Math.floor(random(8, 12));
      const colors = Math.random() > 0.18
        ? ["#fff9a9", "#ffd33d", "#ff8c1f"]
        : ["#fff6d8", "#ff5d8f", "#8068ff"];

      particles.push({
        type: "bottomSun",
        x: origin.x + random(-origin.w * 0.2, origin.w * 0.2),
        y: origin.y + random(-origin.h * 0.06, origin.h * 0.12),
        vx: Math.cos(angle) * speed + random(-1.2, 1.2),
        vy: Math.sin(angle) * speed + random(1.6, 4.4),
        size,
        spin: random(-0.16, 0.16),
        rotation: random(0, Math.PI),
        life: random(0.74, 1.2) + power * 0.0028,
        maxLife: 1,
        colors,
        rays: rayCount,
        rayScales: Array.from({ length: rayCount }, () => random(0.86, 1.08)),
        wobble: random(0.9, 2.4)
      });
      particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
    }

    function addSpark(origin, power) {
      const angle = random(-Math.PI * 1.04, Math.PI * 0.04);
      const level = stormLevel();
      const speed = random(3.4, 8.8) + power * 0.045 + level * 0.35;
      confetti.push({
        x: origin.x + random(-origin.w * 0.34, origin.w * 0.34),
        y: origin.y + random(-origin.h * 0.26, origin.h * 0.08),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - random(0.4, 2.6),
        size: random(4, 9) + power * 0.03 + level * 0.4,
        life: random(0.55, 1.0) + level * 0.03,
        maxLife: 1,
        color: ["#fffef2", "#ffd33d", "#ff5d8f", "#1bc7a6", "#8068ff"][Math.floor(random(0, 5))],
        rotation: random(0, Math.PI),
        spin: random(-0.28, 0.28)
      });
      confetti[confetti.length - 1].maxLife = confetti[confetti.length - 1].life;
    }

    function addRay(origin, power) {
      const level = stormLevel();
      const angle = random(-Math.PI * 0.98, -Math.PI * 0.02);
      rays.push({
        x: origin.x,
        y: origin.y,
        angle,
        length: random(180, 360) + power * 2.1 + level * 30,
        width: random(18, 42) + power * 0.22 + level * 5,
        life: random(0.26, 0.48) + level * 0.025,
        maxLife: 1,
        hue: random(36, 54)
      });
      rays[rays.length - 1].maxLife = rays[rays.length - 1].life;
    }

    function addBottomRay(origin, power) {
      const level = stormLevel();
      rays.push({
        x: origin.x + random(-origin.w * 0.24, origin.w * 0.24),
        y: origin.y,
        angle: random(Math.PI * 0.18, Math.PI * 0.82),
        length: random(150, 320) + power * 1.6 + level * 26,
        width: random(16, 38) + power * 0.18 + level * 4,
        life: random(0.22, 0.42) + level * 0.02,
        maxLife: 1,
        hue: random(32, 58)
      });
      rays[rays.length - 1].maxLife = rays[rays.length - 1].life;
    }

    function addMegaRay(origin, power) {
      const level = stormLevel();
      const count = Math.min(3, Math.max(1, level));
      for (let i = 0; i < count; i += 1) {
        rays.push({
          x: origin.x + random(-origin.w * 0.18, origin.w * 0.18),
          y: origin.y + random(-origin.h * 0.2, origin.h * 0.05),
          angle: random(-Math.PI * 1.03, Math.PI * 0.03),
          length: random(width * 0.35, width * 0.7) + power * 1.25,
          width: random(42, 88) + level * 10,
          life: random(0.3, 0.56),
          maxLife: 1,
          hue: random(29, 62)
        });
        rays[rays.length - 1].maxLife = rays[rays.length - 1].life;
      }
    }

    function addFlare(origin, power) {
      const level = stormLevel();
      flares.push({
        x: origin.x + random(-origin.w * 0.08, origin.w * 0.08),
        y: origin.y + random(-origin.h * 0.14, origin.h * 0.06),
        radius: 22 + power * 0.22,
        maxRadius: 100 + power * 1.45 + level * 34,
        life: 0.28 + level * 0.04,
        maxLife: 1,
        hue: random(36, 62)
      });
      flares[flares.length - 1].maxLife = flares[flares.length - 1].life;
    }

    function shockwave(x, y, power, mega = false) {
      const now = performance.now();
      if (!mega && now - lastWaveAt < 140) return;
      lastWaveAt = now;
      const existing = document.querySelectorAll(".shockwave");
      if (existing.length > 3) existing[0].remove();
      const wave = document.createElement("span");
      wave.className = mega ? "shockwave mega" : "shockwave";
      wave.style.left = x + "px";
      wave.style.top = y + "px";
      wave.style.width = 18 + power * (mega ? 0.7 : 0.38) + "px";
      wave.style.height = 18 + power * (mega ? 0.7 : 0.38) + "px";
      document.body.appendChild(wave);
      window.setTimeout(() => wave.remove(), mega ? 1100 : 780);
    }

    function caption(x, y, text, power) {
      const now = performance.now();
      if (now - lastCaptionAt < 520) return;
      lastCaptionAt = now;
      const existing = document.querySelectorAll(".caption");
      if (existing.length > 2) existing[0].remove();
      const tag = document.createElement("span");
      tag.className = "caption";
      tag.textContent = text;
      tag.style.left = x + random(-40, 40) + "px";
      tag.style.top = y + random(-20, 20) + "px";
      tag.style.setProperty("--drift", random(-70, 70) + "px");
      tag.style.setProperty("--spin", random(-12, 12) + "deg");
      tag.style.fontSize = clamp(13 + power * 0.09, 13, 25) + "px";
      document.body.appendChild(tag);
      window.setTimeout(() => tag.remove(), 1300);
    }

    function comicSticker(x, y, power) {
      const now = performance.now();
      if (now - lastStickerAt < 620 || quality < 0.62) return;
      lastStickerAt = now;
      const existing = document.querySelectorAll(".comic-sticker");
      if (existing.length > 1) existing[0].remove();
      const tag = document.createElement("span");
      tag.className = "comic-sticker";
      tag.textContent = stickerWords[Math.floor(random(0, stickerWords.length))];
      tag.style.left = x + random(-90, 90) + "px";
      tag.style.top = y + random(-80, 70) + "px";
      tag.style.setProperty("--sticker-rotate", random(-14, 12) + "deg");
      tag.style.setProperty("--sticker-rotate-end", random(-22, 22) + "deg");
      tag.style.setProperty("--sticker-drift-x", random(-110, 110) + "px");
      tag.style.setProperty("--sticker-drift-y", random(-150, -70) + "px");
      tag.style.fontSize = clamp(22 + power * 0.12, 22, 52) + "px";
      document.body.appendChild(tag);
      window.setTimeout(() => tag.remove(), 820);
    }

    function triggerFlash(power) {
      if (quality < 0.58) return;
      flashOpacity = Math.max(flashOpacity, clamp(0.06 + power * 0.0015 + stormLevel() * 0.025, 0.06, 0.24));
    }

    function triggerShake(power) {
      shakeStrength = Math.max(shakeStrength, clamp(1.2 + power * 0.018 + stormLevel() * 0.8, 1.2, 5.8));
    }

    function popElement(element) {
      element.classList.remove("comic-pop");
      void element.offsetWidth;
      element.classList.add("comic-pop");
    }

    function setSuperClickMode(enabled) {
      if (enabled && !superClickUnlocked) return;
      superClickMode = enabled;
      turboRamp = clamp(turboChargePercent / turboMaxPercent, 0, 1);
      turboCarry = 0;
      superClickButton.setAttribute("aria-pressed", enabled ? "true" : "false");
      updateTurboStatus();
      mouthSign.textContent = enabled ? "连点" : mouthWords[Math.floor(random(0, mouthWords.length))];
      ticker.textContent = enabled
        ? "超级连点模式已启动：它会越来越快，直到快得很有道理。"
        : "超级连点模式已关闭：现在轮到你的手指亲自上班。";
      caption(
        window.innerWidth * 0.5,
        window.innerHeight * 0.55,
        enabled ? "连点器上岗：越点越快，快了就不慢。" : "连点器下班：今天它已经完成了今天。",
        enabled ? 48 : 28
      );
      playSound(enabled ? "toggleOn" : "toggleOff");
      if (enabled) {
        lastAutoBurst = 0;
        burst("turbo", 12);
      }
    }

    function burst(source, forcedPower = 0) {
      const now = performance.now();
      const minBurstGap = source === "turbo"
        ? (quality < 0.62 ? 42 : 18)
        : 70;
      if (source !== "intro" && now - lastBurst < minBurstGap) return;
      const interval = Math.max(16, now - lastClick);
      const rapidBonus = clamp((560 - interval) / 18, 0, 30);
      const holdBonus = isPressing ? clamp((now - pressStart) / 230, 0, 52) : 0;
      const heatBefore = heat;
      const heatGain = source === "intro"
        ? 0.4
        : source === "turbo"
          ? 1.35 + rapidBonus * 0.032 + forcedPower * 0.034
          : 0.64 + rapidBonus * 0.018 + holdBonus * 0.011 + forcedPower * 0.018;
      setHeat(heat + heatGain);
      const level = stormLevel();
      const turboDrive = source === "turbo" ? Math.max(1, turboChargePercent / 100) : 1;
      const turboTier = source === "turbo" ? turboLevel : 1;
      const maxPower = source === "turbo" ? 210 + turboDrive * 92 + turboTier * 38 : 168;
      const power = clamp(
        20 + rapidBonus * 0.9 + holdBonus + forcedPower + heatBefore * 0.5 + level * 9 + (source === "turbo" ? turboDrive * 15 + turboTier * 7 : 0),
        14,
        maxPower
      );
      const origin = getBoxCenter();
      const bottomOrigin = {
        x: origin.x,
        y: origin.y + origin.h * 0.58,
        w: origin.w * 0.78,
        h: origin.h * 0.34
      };
      const emission = clamp(quality, 0.45, 1);
      const turboEmission = source === "turbo" ? 0.34 + turboDrive * 0.13 : 1;
      const count = Math.floor(clamp((8 + power * 0.16 + level * 4 + Math.random() * 5) * emission * turboEmission, 5, source === "turbo" ? 36 + turboTier * 18 : 36));
      const bottomCount = Math.floor(clamp((5 + power * 0.11 + level * 4 + turboRamp * 14 + turboDrive * 9) * emission, 4, source === "turbo" ? 34 + turboTier * 26 : 22));

      totalSuns += count + bottomCount;
      sunCount.textContent = totalSuns.toLocaleString("zh-CN") + " 份";

      for (let i = 0; i < count; i += 1) {
        addSunParticle(origin, power);
      }

      for (let i = 0; i < bottomCount; i += 1) {
        addBottomSunParticle(bottomOrigin, power * (source === "turbo" ? 0.9 : 0.72));
      }

      const sparkCount = Math.floor(clamp((5 + power * 0.1 + level * 3 + (source === "turbo" ? turboDrive * 4 : 0)) * emission * turboEmission, 3, source === "turbo" ? 22 + turboTier * 10 : 22));
      for (let i = 0; i < sparkCount; i += 1) {
        addSpark(origin, power);
      }

      const rayCount = Math.floor(clamp((1 + power * 0.014 + level + (source === "turbo" ? turboDrive * 0.8 : 0)) * emission * (source === "turbo" ? 0.72 : 1), 1, source === "turbo" ? 7 + turboTier * 2 : 7));
      for (let i = 0; i < rayCount; i += 1) {
        addRay(origin, power);
      }

      const bottomRayCount = Math.floor(clamp((1 + level + turboRamp * 3 + (source === "turbo" ? turboDrive * 1.4 : 0)) * emission, 1, source === "turbo" ? 7 + turboTier * 2 : 4));
      for (let i = 0; i < bottomRayCount; i += 1) {
        addBottomRay(bottomOrigin, power);
      }

      if (level >= 1) {
        comicSticker(origin.x, origin.y - origin.h * 0.22, power);
        addFlare(origin, power * 0.86);
      }

      if (level >= 2 && quality > 0.55) {
        addMegaRay(origin, power);
        triggerFlash(power * 0.72);
      }

      if (source === "turbo" && turboRamp > 0.68 && quality > 0.58) {
        addFlare(bottomOrigin, power * (0.9 + turboRamp * 0.55 + turboDrive * 0.18));
        triggerFlash(power * 0.45);
      }

      if (level >= 3 && quality > 0.68 && Math.random() > 0.55) {
        addFlare(origin, power + 26);
        addMegaRay(origin, power + 20);
        comicSticker(origin.x, origin.y - origin.h * 0.34, power + 24);
      }

      if (level >= 4 && quality > 0.72) {
        addFlare(origin, power + 54);
        addMegaRay(origin, power + 48);
        triggerFlash(power + 48);
        playSound("storm", 1.15);
        shockwave(origin.x, origin.y, power + 38, true);
      }

      if (source !== "hold" || Math.random() > 0.55) {
        lineIndex = (lineIndex + 1) % funnyLines.length;
        ticker.textContent = funnyLines[lineIndex];
        subtitle.textContent = subtitles[Math.floor(random(0, subtitles.length))];
        mouthSign.textContent = mouthWords[Math.floor(random(0, mouthWords.length))];
        caption(origin.x, origin.y - origin.h * 0.38, funnyLines[lineIndex], power);
      }

      triggerShake(power);
      shockwave(origin.x, origin.y, power, level >= 3);
      if (source === "turbo" && turboRamp > 0.58) {
        shockwave(bottomOrigin.x, bottomOrigin.y, power * 0.75, level >= 2);
      }
      if (source === "turbo") {
        playSound("turbo", 0.7 + turboRamp);
      } else if (source === "hold") {
        playSound("hold", 0.8 + level * 0.12);
      } else if (source !== "intro") {
        playSound("click", 0.8 + level * 0.16);
      }
      popElement(boxWrap);
      lastClick = now;

      trimEffects();
    }

    function trimEffects() {
      const highTurbo = superClickMode && turboRamp > 0.72;
      const lateGame = turboLevel >= 4;
      const particleMax = quality < 0.75 && !lateGame ? 170 : (highTurbo ? 330 + turboLevel * 180 : 250 + turboLevel * 60);
      const confettiMax = quality < 0.75 && !lateGame ? 70 : (highTurbo ? 140 + turboLevel * 60 : 110 + turboLevel * 24);
      const rayMax = quality < 0.75 && !lateGame ? 24 : (highTurbo ? 50 + turboLevel * 20 : 34 + turboLevel * 8);
      const flareMax = quality < 0.75 && !lateGame ? 4 : (highTurbo ? 9 + turboLevel * 4 : 6 + turboLevel);
      if (particles.length > particleMax) particles.splice(0, particles.length - particleMax);
      if (confetti.length > confettiMax) confetti.splice(0, confetti.length - confettiMax);
      if (rays.length > rayMax) rays.splice(0, rays.length - rayMax);
      if (flares.length > flareMax) flares.splice(0, flares.length - flareMax);
    }

    function drawFlare(flare) {
      const progress = 1 - clamp(flare.life / flare.maxLife, 0, 1);
      const alpha = clamp(flare.life / flare.maxLife, 0, 1);
      const radius = flare.radius + (flare.maxRadius - flare.radius) * progress;
      const grad = ctx.createRadialGradient(flare.x, flare.y, radius * 0.05, flare.x, flare.y, radius);
      grad.addColorStop(0, `hsla(${flare.hue}, 100%, 78%, ${0.42 * alpha})`);
      grad.addColorStop(0.42, `hsla(${flare.hue}, 100%, 62%, ${0.22 * alpha})`);
      grad.addColorStop(0.74, `hsla(${flare.hue - 14}, 100%, 54%, ${0.1 * alpha})`);
      grad.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.save();
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(flare.x, flare.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = Math.max(2, radius * 0.025);
      ctx.strokeStyle = `hsla(${flare.hue}, 100%, 74%, ${0.46 * alpha})`;
      ctx.beginPath();
      ctx.arc(flare.x, flare.y, radius * 0.64, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawSun(p) {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      const wobble = Math.sin(performance.now() * 0.005 * p.wobble + p.x * 0.02) * 0.08;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation + wobble);
      ctx.globalAlpha = alpha;

      for (let i = 0; i < p.rays; i += 1) {
        const angle = (Math.PI * 2 / p.rays) * i;
        const inner = p.size * 0.48;
        const outer = p.size * p.rayScales[i];
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle - 0.1) * inner, Math.sin(angle - 0.1) * inner);
        ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
        ctx.lineTo(Math.cos(angle + 0.1) * inner, Math.sin(angle + 0.1) * inner);
        ctx.closePath();
        ctx.fillStyle = p.colors[1];
        ctx.fill();
        ctx.lineWidth = Math.max(1.4, p.size * 0.025);
        ctx.strokeStyle = "rgba(179, 86, 0, 0.42)";
        ctx.stroke();
      }

      const glow = ctx.createRadialGradient(0, 0, p.size * 0.1, 0, 0, p.size * 1.15);
      glow.addColorStop(0, p.colors[0]);
      glow.addColorStop(0.58, p.colors[1]);
      glow.addColorStop(1, "rgba(255, 141, 42, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, p.size * 1.1, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = p.colors[0];
      ctx.beginPath();
      ctx.arc(0, 0, p.size * 0.52, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = Math.max(2, p.size * 0.075);
      ctx.strokeStyle = "rgba(158, 78, 0, 0.68)";
      ctx.stroke();

      ctx.fillStyle = "rgba(55, 36, 18, 0.62)";
      ctx.beginPath();
      ctx.arc(-p.size * 0.16, -p.size * 0.08, p.size * 0.045, 0, Math.PI * 2);
      ctx.arc(p.size * 0.16, -p.size * 0.08, p.size * 0.045, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = Math.max(1.2, p.size * 0.04);
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(55, 36, 18, 0.48)";
      ctx.beginPath();
      ctx.arc(0, p.size * 0.04, p.size * 0.18, 0.18, Math.PI - 0.18);
      ctx.stroke();
      ctx.restore();
    }

    function drawRay(ray) {
      const alpha = clamp(ray.life / ray.maxLife, 0, 1);
      ctx.save();
      ctx.translate(ray.x, ray.y);
      ctx.rotate(ray.angle);
      const grad = ctx.createLinearGradient(0, 0, ray.length, 0);
      grad.addColorStop(0, `hsla(${ray.hue}, 100%, 70%, ${0.5 * alpha})`);
      grad.addColorStop(0.28, `hsla(${ray.hue}, 100%, 65%, ${0.24 * alpha})`);
      grad.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -ray.width * 0.5);
      ctx.lineTo(ray.length, -ray.width);
      ctx.lineTo(ray.length, ray.width);
      ctx.lineTo(0, ray.width * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawConfetti(c) {
      const alpha = clamp(c.life / c.maxLife, 0, 1);
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rotation);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = c.color;
      ctx.fillRect(-c.size * 0.5, -c.size * 0.2, c.size, c.size * 0.4);
      ctx.restore();
    }

    function animate(now) {
      const rawDt = (now - lastFrame) / 1000;
      const dt = Math.min(0.033, rawDt);
      lastFrame = now;

      if (rawDt > 0.052) {
        quality = Math.max(0.45, quality - 0.08);
        trimEffects();
      } else {
        quality = Math.min(1, quality + dt * 0.08);
      }

      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = "lighter";

      flashOpacity = Math.max(0, flashOpacity - dt * 1.8);
      document.documentElement.style.setProperty("--flash-opacity", flashOpacity.toFixed(3));

      shakeStrength = Math.max(0, shakeStrength - dt * 16);
      if (shakeStrength > 0.05) {
        document.documentElement.style.setProperty("--shake-x", random(-shakeStrength, shakeStrength).toFixed(1) + "px");
        document.documentElement.style.setProperty("--shake-y", random(-shakeStrength, shakeStrength).toFixed(1) + "px");
      } else {
        document.documentElement.style.setProperty("--shake-x", "0px");
        document.documentElement.style.setProperty("--shake-y", "0px");
      }

      if (isPressing && now - lastBurst > clamp(330 - heat * 0.9, 160, 330)) {
        burst("hold", clamp((now - pressStart) / 250, 0, 30));
        lastBurst = now;
      }

      if (superClickMode) {
        const chargeRate = 58 + turboLevel * 18 + turboChargePercent * 0.08;
        turboChargePercent = clamp(turboChargePercent + dt * chargeRate, 0, turboMaxPercent);
        turboRamp = clamp(turboChargePercent / turboMaxPercent, 0, 1);
        if (turboChargePercent >= turboMaxPercent) {
          revealTurboUpgrade();
        }
        const turboDrive = Math.max(1, turboChargePercent / 100);
        const qualityPenalty = quality < 0.6 && turboLevel < 4 ? (0.6 - quality) * 85 : 0;
        const turboInterval = clamp(82 - turboRamp * 48 - turboDrive * 14 - turboLevel * 6 + qualityPenalty, Math.max(3, 11 - turboLevel), 82);
        const elapsed = Math.max(0, now - lastAutoBurst);
        turboCarry += elapsed / turboInterval;
        const pulseLimit = quality < 0.62 && turboLevel < 4
          ? 2
          : Math.floor(Math.min(80, 3 + turboDrive * 2.2 + turboLevel * 2.4));
        const pulses = Math.min(pulseLimit, Math.floor(turboCarry));
        if (pulses > 0) {
          for (let i = 0; i < pulses; i += 1) {
            burst("turbo", 16 + turboChargePercent * 0.18 + turboLevel * 12 + stormLevel() * 4);
          }
          turboCarry -= pulses;
          lastAutoBurst = now;
        }
        updateTurboStatus();
      } else {
        turboRamp = clamp(turboChargePercent / turboMaxPercent, 0, 1);
        turboCarry = 0;
        updateTurboStatus();
      }

      setHeat(heat - dt * ((isPressing || superClickMode) ? 0.9 : 5.4));

      for (let i = flares.length - 1; i >= 0; i -= 1) {
        const flare = flares[i];
        flare.life -= dt;
        if (flare.life <= 0) {
          flares.splice(i, 1);
        } else {
          drawFlare(flare);
        }
      }

      for (let i = rays.length - 1; i >= 0; i -= 1) {
        const ray = rays[i];
        ray.life -= dt;
        if (ray.life <= 0) {
          rays.splice(i, 1);
        } else {
          drawRay(ray);
        }
      }

      ctx.globalCompositeOperation = "source-over";
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.vy += 7.6 * dt;
        p.vx *= 0.996;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.spin;
        p.life -= dt;
        if (p.life <= 0 || p.y > height + 120 || p.x < -120 || p.x > width + 120) {
          particles.splice(i, 1);
        } else {
          drawSun(p);
        }
      }

      for (let i = confetti.length - 1; i >= 0; i -= 1) {
        const c = confetti[i];
        c.vy += 8.8 * dt;
        c.x += c.vx;
        c.y += c.vy;
        c.rotation += c.spin;
        c.life -= dt;
        if (c.life <= 0 || c.y > height + 80) {
          confetti.splice(i, 1);
        } else {
          drawConfetti(c);
        }
      }

      requestAnimationFrame(animate);
    }

    function startPress(event) {
      if (event.pointerId != null && event.isPrimary === false) return;
      event.preventDefault();
      if (isPressing) return;
      isPressing = true;
      pressStart = performance.now();
      lastBurst = 0;
      box.classList.add("pressing");
      activePointerId = event.pointerId ?? null;
      if (event.pointerId != null) {
        box.setPointerCapture?.(event.pointerId);
      }
      burst("press", 10);
    }

    function endPress(event) {
      if (!isPressing) return;
      event?.preventDefault?.();
      isPressing = false;
      box.classList.remove("pressing");
      if (event?.pointerId != null) {
        box.releasePointerCapture?.(event.pointerId);
      } else if (activePointerId != null) {
        box.releasePointerCapture?.(activePointerId);
      }
      activePointerId = null;
    }

    if ("PointerEvent" in window) {
      box.addEventListener("pointerdown", startPress);
      box.addEventListener("pointerup", endPress);
      box.addEventListener("pointercancel", endPress);
      box.addEventListener("lostpointercapture", endPress);
      box.addEventListener("pointerleave", (event) => {
        if (event.pointerType !== "touch" && isPressing) endPress(event);
      });
    } else {
      box.addEventListener("touchstart", startPress, { passive: false });
      box.addEventListener("touchend", endPress, { passive: false });
      box.addEventListener("touchcancel", endPress, { passive: false });
      box.addEventListener("mousedown", startPress);
      window.addEventListener("mouseup", endPress);
    }

    box.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        burst("keyboard", 12);
      }
    });

    superClickButton.addEventListener("click", () => {
      setSuperClickMode(!superClickMode);
    });

    superClickButton.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        setSuperClickMode(!superClickMode);
      }
    });

    upgradeClickButton.addEventListener("click", () => {
      upgradeSuperClick();
    });

    upgradeClickButton.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        upgradeSuperClick();
      }
    });

    soundToggle.addEventListener("click", () => {
      setSoundEnabled(!soundEnabled);
    });

    soundToggle.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        setSoundEnabled(!soundEnabled);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && superClickMode) {
        setSuperClickMode(false);
      }
    });

    window.addEventListener("resize", resize);
    resize();
    setHeat(0);
    requestAnimationFrame(animate);

    window.setTimeout(() => {
      const origin = getBoxCenter();
      caption(origin.x, origin.y - origin.h * 0.42, "阳光盒已上线，亮得很有礼貌。", 24);
      burst("intro", 16);
    }, 420);
  </script>
</body>
</html>
